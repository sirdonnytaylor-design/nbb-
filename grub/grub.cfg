insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

insmod all_video
insmod font

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod gfxterm
    set gfxmode="auto"
    terminal_input console
    terminal_output gfxterm
fi

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray
set timeout=15
set default=0

menuentry "Xero Linux Hyprland KDE (x86_64)" --class arch --class gnu-linux --class gnu --class os --id 'archlinux' {
    set gfxpayload=keep
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "Xero Linux Hyprland KDE (x86_64, console)" --class arch --class gnu-linux --class gnu --class os --id 'archlinux-console' {
    set gfxpayload=keep
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% systemd.unit=multi-user.target
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

if [ "${grub_platform}" == "efi" ]; then
    menuentry "UEFI Shell" {
        insmod efi_uga
        insmod efi_gop
        insmod font
        if loadfont "${prefix}/fonts/unicode.pf2" ; then
            insmod gfxterm
            set gfxmode="auto"
            terminal_input console
            terminal_output gfxterm
        fi
        chainloader shell.efi
    }

    menuentry "UEFI Firmware Settings" --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry "System shutdown" --class shutdown --class poweroff {
    echo "System shutting down..."
    halt
}

menuentry "System restart" --class reboot --class restart {
    echo "System restarting..."
    reboot
}