timeout 15

default archiso
display boot.msg

label archiso
menu label ^Xero Linux Hyprland KDE (x86_64)
menu default
linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
append archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%

label archiso-console
menu label ^Xero Linux Hyprland KDE (x86_64, console)
linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
append archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% systemd.unit=multi-user.target

label memtest
menu label Memory Test (memtest86+)
linux /%INSTALL_DIR%/boot/memtest86+/memtest.bin

label existing
menu label Boot existing OS
com32 chain.c32
append hd0 0